name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version (e.g. v0.1.0)
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: oven-sh/setup-bun@v2
      - run: npm ci
      - run: make build
      - run: make typecheck
      - run: make test
      - run: make dist
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          generate_release_notes: true
          files: |
            dist/codocs-darwin-arm64
            dist/codocs-darwin-x64
            dist/codocs-linux-x64
            dist/codocs-linux-arm64
            dist/codocs-windows-x64
