name: NPM Token Expiry Check

on:
  schedule:
    # Every Monday at 9am UTC
    - cron: '0 9 * * 1'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check NPM token validity
        run: |
          npm whoami --registry https://registry.npmjs.org 2>/dev/null
          if [ $? -ne 0 ]; then
            echo "::error::NPM_TOKEN is invalid or expired. Rotate it at npmjs.com and update the GitHub secret."
            exit 1
          fi
          echo "NPM token is valid"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
